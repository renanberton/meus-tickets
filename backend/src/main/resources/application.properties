# Banco de dados (usa variáveis do Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/meus_tickets}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:chave-super-secreta-para-teste-123}
jwt.expiration=86400000

# HubSpot
hubspot.token=${HUBSPOT_TOKEN}